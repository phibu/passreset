version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/src/PassReset.Web/ClientApp"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # Hold back packages currently publishing pre-release (beta/next) versions
    # at higher semver than their stable line. Revisit each when stable ships.
    ignore:
      - dependency-name: "typescript"
        versions: [">=6.0.0-0"]
      - dependency-name: "@mui/material"
        versions: [">=7.0.0-0"]
      - dependency-name: "@mui/icons-material"
        versions: [">=7.0.0-0"]
      # ESLint 10 is blocked by eslint-plugin-react-hooks@7.0.1, whose peer
      # range tops out at ^9. Unblock once the plugin ships a stable release
      # with ESLint 10 peer support.
      - dependency-name: "eslint"
        versions: [">=10.0.0-0"]
      - dependency-name: "@eslint/js"
        versions: [">=10.0.0-0"]

  - package-ecosystem: "nuget"
    directory: "/src"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      nuget-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
